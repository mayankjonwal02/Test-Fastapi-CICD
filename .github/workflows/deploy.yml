name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Deploy App
        run: |
          cd ~/Test-Fastapi-CICD

          git fetch origin

          git reset --hard origin/main

          git clean -fd

          docker compose down

          docker compose up -d --build

          docker image prune -f